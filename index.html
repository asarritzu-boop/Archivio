                const ArchiveCrypto = {
            async deriveKey(password, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
                return crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                    keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
                );
            },
            async encryptData(plainText, password) {
                const enc = new TextEncoder();
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await this.deriveKey(password, salt);
                const cipherBuffer = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(plainText));
                
                const toB64 = buf => {
                    let bin = '';
                    const bytes = new Uint8Array(buf);
                    for(let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
                    return btoa(bin);
                };
                return JSON.stringify({ salt: toB64(salt), iv: toB64(iv), data: toB64(cipherBuffer) });
            },
            async decryptData(payloadJSON, password) {
                const payload = JSON.parse(payloadJSON);
                const fromB64 = b64 => {
                    const bin = atob(b64);
                    const bytes = new Uint8Array(bin.length);
                    for(let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    return bytes;
                };
                const key = await this.deriveKey(password, fromB64(payload.salt));
                const decryptedBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv: fromB64(payload.iv) }, key, fromB64(payload.data));
                return new TextDecoder().decode(decryptedBuffer);
            }
        };

        function getFolderById(id, list) {
            list = list || window.ARCHIVE_DATA.folders;
            for (const f of list) {

                if (f.subfolders && f.subfolders.length) {
                    const found = getFolderById(id, f.subfolders);

        // Converte la stringa Base64 in un buffer binario (indispensabile per Mammoth e PDF.js)
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // MOTORE DI CARICAMENTO LIBRERIE (Online/Offline)
        async function loadLibrary(id, globalVar, cdnUrl) {
            if (window[globalVar]) return window[globalVar]; // Già in memoria

            return new Promise((resolve, reject) => {
                const el = document.getElementById(id);
                const code = el ? el.textContent.trim() : '';
                const script = document.createElement('script');
                
                script.onload = () => resolve(window[globalVar]);
                script.onerror = () => reject(new Error('Errore caricamento: ' + id));

                if (code) {
                    // Siamo nel clone offline: "sveglia" il codice archiviato
                    const blob = new Blob([code], { type: 'application/javascript' });
                    script.src = URL.createObjectURL(blob);
                } else {
                    // Primo avvio online: scarica da internet
                    script.src = cdnUrl;
                }
                document.head.appendChild(script);
            });
        }

        function filterArchive() {
            const val = document.getElementById('search-bar').value.trim();
            document.getElementById('clear-search').style.display = val ? 'flex' : 'none';

            if (!val) {
                // Torna alla vista cartelle normale
                document.getElementById('folders-view').style.display = '';
                document.getElementById('search-results-view') && (document.getElementById('search-results-view').remove());
                renderFolders();
                return;
            }
            
            

            const searchLower = val.toLowerCase();

            // Raccoglie tutti i file corrispondenti da tutte le cartelle (incluse sottocartelle)
            const matches = [];
            function searchInFolder(folder, path) {
                folder.files.forEach(file => {
                    if (file.name.toLowerCase().includes(searchLower)) {
                        matches.push({ file, folderName: path, folderId: folder.id });
                    }
                });
                (folder.subfolders || []).forEach(sub => searchInFolder(sub, path + ' › ' + sub.name));
            }
            window.ARCHIVE_DATA.folders.forEach(folder => searchInFolder(folder, folder.name));

            // Nasconde la griglia cartelle e mostra la lista risultati
            document.getElementById('folders-view').style.display = 'none';

            let resultsView = document.getElementById('search-results-view');
            if (!resultsView) {
                resultsView = document.createElement('div');
                resultsView.id = 'search-results-view';
                resultsView.style.cssText = 'max-width:900px;margin:0 auto;background:white;border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.08);';
                document.getElementById('folders-view').insertAdjacentElement('afterend', resultsView);
            }

            if (!matches.length) {
                resultsView.innerHTML = `<p style="text-align:center;padding:20px;color:#888;">Nessun file trovato per "<b>${val}</b>"</p>`;
                return;
            }

            resultsView.innerHTML = `<p style="font-size:13px;color:#86868b;margin-bottom:12px;">${matches.length} risultat${matches.length === 1 ? 'o' : 'i'} per "<b>${val}</b>"</p>`;
            const ul = document.createElement('ul');
            ul.className = 'file-list';

            matches.forEach(({file, folderName, folderId}) => {
                const li = document.createElement('li');
                li.className = 'file-item';

                li.innerHTML = `
                    <div class="file-info">

                        <button class="secondary" onclick="downloadFileFromFolder('${file.id}','${folderId}')">⬇️</button>
                    </div>
                `;
                ul.appendChild(li);
            });

            resultsView.appendChild(ul);
        }

function collectClipboardItems(fileLis, folderCards) {
    const result = [];
    fileLis.forEach(li => {
        const id = li.dataset.fileId;
        let file = currentFolderId
            ? getFolderById(currentFolderId).files.find(f => f.id === id)
            : (window.ARCHIVE_DATA.freeFiles || []).find(f => f.id === id);
        if (file) result.push({ type:'file', data: JSON.parse(JSON.stringify(file)), sourceFolder: currentFolderId });
    });
    folderCards.forEach(card => {
        const fid = card.dataset.folderId;
        if (!fid) return;
        const f = getFolderById(fid) || window.ARCHIVE_DATA.folders.find(x => x.id === fid);
        if (f) result.push({ type:'folder', data: JSON.parse(JSON.stringify(f)), sourceParent: currentFolderId });
    });
    return result;
}

function removeFileFromArchive(fileId, sourceFolderId) {

    } else {
        window.ARCHIVE_DATA.freeFiles = (window.ARCHIVE_DATA.freeFiles || []).filter(x => x.id !== fileId);
    }
}

function removeFolderFromArchive(folderId, parentId) {
    if (parentId) {
        const p = getFolderById(parentId);
        if (p && p.subfolders) p.subfolders = p.subfolders.filter(x => x.id !== folderId);
    } else {
        window.ARCHIVE_DATA.folders = window.ARCHIVE_DATA.folders.filter(x => x.id !== folderId);
    }
}

function pickPasteDestination() {
    return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;`;

                <div id="paste-dest-list" style="display:flex;flex-direction:column;gap:8px;"></div>
                <button id="btn-paste-root" style="margin-top:12px;width:100%;padding:11px;background:#e8e8ed;color:#333;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;">🏠 Schermata iniziale</button>
                <button id="btn-paste-cancel" style="margin-top:8px;width:100%;padding:10px;background:transparent;color:#888;border:none;font-size:14px;cursor:pointer;">Annulla</button>
            </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#paste-dest-list').append(
            ...folders.map(f => {
                const btn = document.createElement('button');
                btn.style.cssText = `width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;`;
                btn.innerHTML = `<span>📂</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>`;
                btn.onclick = () => { overlay.remove(); resolve(f.id); };
                return btn;
            })
        );
        overlay.querySelector('#btn-paste-root').onclick   = () => { overlay.remove(); resolve(null); };
        overlay.querySelector('#btn-paste-cancel').onclick = () => { overlay.remove(); resolve(false); };
    });
}

async function multiPaste() {
    if (!clipboard.items.length) return;
    let destFolderId = currentFolderId;
    if (!currentFolderId && window.ARCHIVE_DATA.folders.length > 0) {
        const choice = await pickPasteDestination();
        if (choice === false) return;
        destFolderId = choice;
    }
    clipboard.items.forEach(item => {
        if (item.type === 'file') {
            const newFile = JSON.parse(JSON.stringify(item.data));
            if (clipboard.mode === 'copy') {
    newFile.id = 'fi_' + Date.now() + Math.random();
                const ext  = newFile.name.includes('.') ? '.' + newFile.name.split('.').pop() : '';
                const base = newFile.name.replace(/\.[^.]+$/, '');
                newFile.name = base + '_copia' + ext;
            }
            if (destFolderId) getFolderById(destFolderId).files.push(newFile);
            else { if (!window.ARCHIVE_DATA.freeFiles) window.ARCHIVE_DATA.freeFiles = []; window.ARCHIVE_DATA.freeFiles.push(newFile); }
        } else if (item.type === 'folder') {
            const newFolder = JSON.parse(JSON.stringify(item.data));
            if (clipboard.mode === 'copy') {
                (function reassign(f) { f.id = 'f_' + Date.now() + Math.random(); (f.subfolders||[]).forEach(reassign); })(newFolder);
            }
            if (destFolderId) { const d = getFolderById(destFolderId); if (!d.subfolders) d.subfolders = []; d.subfolders.push(newFolder); }
            else window.ARCHIVE_DATA.folders.push(newFolder);
        }
    });
    if (clipboard.mode === 'cut') {
        clipboard.items.forEach(item => {
            if (item.type === 'file')   removeFileFromArchive(item.data.id, item.sourceFolder);
            else                        removeFolderFromArchive(item.data.id, item.sourceParent);
        });
        clipboard = { items: [], mode: null };
    }
    showToast('📌 Incollato!');
    refreshPasteButton();
    deselectAll(null);
    if (currentFolderId) renderFiles();
    else { renderFolders(); renderFreeFiles(); }
}

function multiDelete() {
    const { files, folders, total } = getSelectedItems();
    if (!total) return;
    if (!confirm(`Eliminare ${total} element${total > 1 ? 'i' : 'o'} selezionat${total > 1 ? 'i' : 'o'}?`)) return;
    files.forEach(li => {
        const id = li.dataset.fileId;
        if (currentFolderId) { const f = getFolderById(currentFolderId); f.files = f.files.filter(x => x.id !== id); }
        else window.ARCHIVE_DATA.freeFiles = (window.ARCHIVE_DATA.freeFiles || []).filter(x => x.id !== id);
    });
    folders.forEach(card => {
        const fid = card.dataset.folderId;

        async function handleFileUpload(event) {
            const folder = getFolderById(currentFolderId);
            const files = Array.from(event.target.files);

            for (const file of files) {
                try {
                    // Usa arrayBuffer() nativo: molto più affidabile su Android
                    // con URI content:// provenienti da "Recenti" o app di terze parti
                    const ab = await file.arrayBuffer();

                    if (!ab || ab.byteLength === 0) {
                        alert(`Impossibile leggere "${file.name}".\nProva a selezionarlo da "Memoria Interna" invece che da "Recenti".`);
                        continue;
                    }

                    // Costruisce il data:URL manualmente dal buffer reale
                    const uint8 = new Uint8Array(ab);
                    let binary = '';
                    for (let i = 0; i < uint8.length; i++) binary += String.fromCharCode(uint8[i]);
                    const base64 = btoa(binary);

                    // Ricava il MIME type dal file (fallback generico)
                    const mime = file.type || 'application/octet-stream';
                    const dataUrl = `data:${mime};base64,${base64}`;

                    folder.files.push({
                        id: 'fi_' + Date.now() + Math.random(),
                        name: file.name,
                        size: file.size,
                        data: dataUrl
                    });
                    renderFiles();

                } catch (err) {
                    alert(`Errore nella lettura di "${file.name}": ${err.message}`);
                }
            }
            // Reset input per permettere ricaricamento dello stesso file
            event.target.value = '';
        }

        function base64ToArrayBuffer(b64) {
            const bin = window.atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return bytes.buffer;
        }

        function base64ToBlob(base64, mime) {

        async function downloadFolder(event, id) {
    event.stopPropagation();
    // Cerca prima nelle cartelle radice, poi ovunque con getFolderById
    const folder = window.ARCHIVE_DATA.folders.find(f => f.id === id) || getFolderById(id);
    try {
        await loadLibrary('lib-jszip', 'JSZip', 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
        const zip = new JSZip();

        // Funzione ricorsiva che aggiunge file e sottocartelle
        function addFolderToZip(zipFolder, folderData) {
            folderData.files.forEach(f => {
                zipFolder.file(f.name, f.data.split(',')[1], {base64: true});
            });
            (folderData.subfolders || []).forEach(sub => {
                const subZip = zipFolder.folder(sub.name);
                addFolderToZip(subZip, sub);
            });
        }

        addFolderToZip(zip, folder);
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = `${folder.name}.zip`;
        a.click();
    } catch(e) {
        alert("Errore creazione ZIP: " + e.message);
    }
}
